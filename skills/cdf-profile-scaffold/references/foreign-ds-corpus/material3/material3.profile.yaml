# ═══════════════════════════════════════════════════════════════════════════════
# Material 3 — CDF Profile (fourth Big-DS foreign-DS pass, token-bridge-exotic)
# CDF Profile Format v1.0.0-draft.8
#
# Scope: Button + FAB only. This Profile models the token surface of
# Google's Material 3 design system, generated deterministically from a
# fixed seed (#6750A4, Material's "Baseline" purple) via
# @material/material-color-utilities@0.4.0, supplemented by statically
# transcribed elevation / shape / motion / typography tokens from
# m3.material.io. Generation output lives in
# <ds-test-dir>/.material3-tokens/ (gitignored). See BIG-DS-MATERIAL3-BRIEF.md
# and findings.md F-material-provisioning for replay detail.
#
# Token-bridge strategy: (γ) as PRINCIPLE (prose-ownership in
# `description:`, zero new format fields), MIXED MECHANISM —
# `token_grammar` for systematic families (color, palette, elevation,
# shape.corner, motion.duration, motion.easing, typography) and
# `standalone_tokens` for singletons (focus outline). This is the
# third mechanism-adaptation in the Big-DS series (shadcn: flat →
# standalone_tokens; Primer: grammar → token_grammar; Material 3: MIXED),
# landing exactly where the post-Primer shadcn footnote predicted.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Identity ─────────────────────────────────────────────────────────────────

name: Material3
version: "0.1.0-draft"
cdf_version: ">=1.0.0-draft <2.0.0"
dtcg_version: "2025.10"
description: >
  Google's Material 3 design system distilled to CDF. Only Button and
  FAB are modelled — the brief's two-component test for the
  token-bridge-exotic case.

  Source-of-truth is dual: (1) the seed-derived colour palette,
  generated from seed `#6750A4` via
  `@material/material-color-utilities@0.4.0` on 2026-04-16 (output in
  `.material3-tokens/tokens-baseline.json`); (2) statically transcribed
  elevation, shape, motion, typography values from m3.material.io
  (output in `.material3-tokens/tokens-static.json`). Neither file is
  a real DTCG tree — both are toolchain-owned intermediate
  representations that a downstream DTCG emitter would consume. CDF
  treats the resolution as toolchain-owned (Profile §6 Build-time
  Enumerability, draft.7).

  State-layer overlays (hover 8%, focus 10%, pressed 10%, dragged
  16%) are NOT declared as modifiers or runtime math. Per the
  Token-Driven Principle (Component §1.1 #2, draft.7) and the brief's
  pre-commit, every interaction state resolves to a discrete
  pre-composed token (e.g. `color.primary.base.hover`), whose value
  the toolchain bakes at DTCG emit time by compositing the overlay
  onto the base. The Profile and Components see only the result —
  not the percentage. The state-layer percentages live in
  `.material3-tokens/tokens-static.json` as toolchain metadata only.

# ── Vocabularies ─────────────────────────────────────────────────────────────
# Material's richer axis matrix than prior passes. Per Profile §5.5
# rule 2, values MAY overlap across vocabularies — Material exploits
# this (e.g. `primary` appears in both `color_role` and `fab_variant`,
# because in Material a FAB's "variant" IS its colour role). Rule 5
# (reserved-namespace isolation) is therefore not triggered for those
# values — they belong to multiple vocabularies and Component axes
# declare the binding explicitly via `binds_to:`.

vocabularies:

  # ── Colour roles — Material 3 semantic colour surface ────────────────
  color_role:
    description: >
      Material 3 colour-role vocabulary. Seven systematic roles define
      the semantic palette: primary (brand CTA), secondary (accent),
      tertiary (complementary accent), error (destructive / warning),
      surface (component surface fill), surfaceVariant (differentiated
      surface — cards on backgrounds, dividers), background (page
      backdrop). Values match the top-level keys in
      `.material3-tokens/tokens-baseline.json`'s schemes.light / .dark
      objects 1:1.
    values: [primary, secondary, tertiary, error, surface, surfaceVariant, background]

  color_slot:
    description: >
      Material 3 colour-role slot axis. Each role has up to four slots:
      `base` (the fill — e.g. `primary`), `on` (the label paired with
      the fill — `onPrimary`), `container` (a lower-emphasis tonal
      fill — `primaryContainer`), `onContainer` (label on container —
      `onPrimaryContainer`). `surface` + `background` only have
      base + on; `surfaceVariant` only has base + on. `outline` is
      modelled separately as a standalone_token (no container slot).
    values: [base, on, container, onContainer]

  # ── Palette tonal scale — the primitives the colour roles derive from
  palette_role:
    description: >
      Material 3 palette axis — the six tonal palettes generated by
      the seed-derivation algorithm. Roles MAP to these palettes
      (primary role ← primary palette at tone 40 light / tone 80 dark,
      etc.) — this Profile exposes the palettes as a separate grammar
      so a consumer CDF Component CAN bind to a raw tone if needed
      (rarely). Neither Button nor FAB uses palette tones directly;
      the grammar is declared for completeness / future cross-component
      use.
    values: [primary, secondary, tertiary, neutral, neutralVariant, error]

  palette_tone:
    description: >
      Material 3 tonal step axis — 16 quantised lightness levels from
      0 (pure black) to 100 (pure white). Values match
      `.material3-tokens/tokens-baseline.json`'s palette.*.* keys 1:1
      (the palette generator computes these deterministically from
      the seed via HCT → L*a*b*).
    values:
      - tone0
      - tone10
      - tone20
      - tone25
      - tone30
      - tone35
      - tone40
      - tone50
      - tone60
      - tone70
      - tone80
      - tone90
      - tone95
      - tone98
      - tone99
      - tone100

  # ── System token families ────────────────────────────────────────────
  elevation_level:
    description: >
      Material 3 elevation tier axis. Six discrete levels (level0–5)
      — each resolves to a box-shadow value at token-build time (see
      `.material3-tokens/tokens-static.json`'s elevation block).
      FAB rest is level3, hover is level4, pressed is level3 (returns
      to baseline). Values prefixed with `level` to keep them string
      identifiers (a raw `0` would collide with other integer vocabs
      in edge cases).
    values: [level0, level1, level2, level3, level4, level5]

  shape_step:
    description: >
      Material 3 shape-corner scale. Seven named steps from 0px (none)
      to 9999px (full — pill). Values match m3.material.io shape-scale
      tokens (see `.material3-tokens/tokens-static.json`'s shape.corner
      block). Buttons use `full` by default; FAB uses `large` at rest
      (switches to `small` when extended — handled at Component level).
    values: [none, extraSmall, small, medium, large, extraLarge, full]

  motion_duration_bucket:
    description: >
      Material 3 motion-duration buckets. Seven named durations from
      50ms (short1) to 400ms (long1). Values match m3.material.io
      motion-duration tokens (see
      `.material3-tokens/tokens-static.json`'s motion.duration block).
      Button / FAB interaction transitions use `short4` (200ms).
    values: [short1, short2, short3, short4, medium1, medium2, long1]

  motion_easing_name:
    description: >
      Material 3 motion-easing names. Five canonical curves: linear,
      standard (the M3 default), emphasized (brand accent), decelerated
      (entering screens), accelerated (leaving screens). Values match
      m3.material.io motion-easing tokens (see
      `.material3-tokens/tokens-static.json`'s motion.easing block).
    values: [linear, standard, emphasized, decelerated, accelerated]

  typography_role:
    description: >
      Material 3 type-scale role axis. Five roles in descending visual
      weight: display (hero), headline (section lead), title (content
      block), body (prose), label (compact UI — button labels, chip
      text). Button and FAB bind to `label`.
    values: [display, headline, title, body, label]

  typography_scale:
    description: >
      Material 3 type-scale size axis. Three sizes per role. Values
      intentionally overlap with `button_size` (and Material's own
      usage) — per Profile §5.5 rule 2, cross-vocabulary overlap is
      legal when disambiguated by binding context.
    values: [large, medium, small]

  # ── Component vocabularies ───────────────────────────────────────────
  button_variant:
    description: >
      Material 3 Button's five variants. `elevated` (raised surface,
      primary container bg), `filled` (high-emphasis primary bg,
      no shadow), `filledTonal` (mid-emphasis secondary container bg),
      `outlined` (transparent bg, stroked), `text` (transparent bg,
      no stroke). Each variant resolves to a distinct (bg, on-bg,
      container-bg, stroke) tuple of colour-role slots — the mapping
      from variant to role-slots lives at the Component spec level
      (see `<ds-test-dir>/specs/button.component.yaml` `tokens:` block).
    values: [elevated, filled, filledTonal, outlined, text]

  fab_variant:
    description: >
      Material 3 FAB's tonal variants. Per m3.material.io, FAB can be
      tinted with `primary`, `secondary`, `tertiary`, or `surface` —
      these values MAP 1:1 to `color_role` entries. Per Profile §5.5
      rule 2, the values overlap legally (same value, different
      vocabularies, disambiguated at axis binding).
    values: [primary, secondary, tertiary, surface]

  size:
    description: >
      Unified scale axis covering both Button (small/medium/large) and
      FAB (small/medium/large/extended). Components restrict to a
      subset at their `properties.size.values` list. `extended` is FAB-
      specific (an elongated FAB with a label) — Button never accepts
      it. See F-material-fab-extended in findings.md for the "extended
      FAB — variant or size?" discussion.
    values: [small, medium, large, extended]

  density_step:
    description: >
      Material 3 density-scale vocabulary (`comfortable`, `default`,
      `compact`). Modulates padding / height via Material's
      density-token family `density.{component}.{step}` which is NOT
      modelled in the Button or FAB spec. Button's `density` property
      therefore declares `target_only: true` — the THIRD-DS data
      point for F-primer-5 / F-shadcn-2. See findings.md F-material-3.
    values: [comfortable, default, compact]

  # ── Interaction state — the state-layer test ─────────────────────────
  interaction_state:
    description: >
      Material 3 interaction-state axis. Material specifies discrete
      state-layer treatments for hover (8%), focus (10%), pressed
      (10%), dragged (16%) — per the brief's pre-commit and draft.7's
      Token-Driven Principle, these are pre-composed as discrete
      tokens at token-build time (e.g. `color.primary.base.hover`
      bakes the 8% onPrimary overlay into the primary fill). The
      Profile and Components see only the resulting tokens. Values
      `rest` / `hover` / `focus` / `pressed` / `disabled` correspond
      to the pressable pattern's state axis via
      `interaction_patterns.pressable.token_mapping` below.
    values: [rest, hover, focus, pressed, disabled]

# ── Token Grammar — seven families ───────────────────────────────────────────
# Material's rich token surface. Seven `token_grammar` entries capture
# the SYSTEMATIC multi-axis families (color × role × slot × state,
# palette × role × tone, elevation × level, shape × step,
# motion.duration × bucket, motion.easing × name, typography × role × scale).
# Every entry carries prose ownership in its `description:` — the (γ)
# principle's evidence mechanism.

token_grammar:

  color:
    pattern: "color.{role}.{slot}.{state}"
    dtcg_type: color
    description: >
      external — Material 3 colour-role token family. Source: seed-
      derived palette from
      `@material/material-color-utilities@0.4.0` with seed `#6750A4`,
      output at `.material3-tokens/tokens-baseline.json`'s
      schemes.{light,dark} objects.

      State variants (`.rest` / `.hover` / `.focus` / `.pressed` /
      `.disabled`) are NOT in the seed output — the toolchain
      pre-composes them by overlaying state-layer opacity (hover 8%,
      focus 10%, pressed 10%; disabled 12% on container + 38% on
      text per Material's disabled spec). Per Token-Driven Principle
      (draft.7 Component §1.1 #2, §13 intro), CDF treats the
      composition as a toolchain transformation — the Profile
      enumerates the resulting paths without knowing the percentages.
      State-layer percentages are documented in
      `.material3-tokens/tokens-static.json`'s stateLayer block for
      TOOLCHAIN reference only (F-material-0).

      Not every (role × slot × state) cell resolves to a meaningful
      token — e.g. `color.background.onContainer.pressed` makes no
      sense for Material's background role (which has no container
      slot and no pressable states). The grammar declares the shape;
      the toolchain provides values only where Material's spec
      defines them. A Component binding a nonexistent cell is caught
      at token-resolution time (CDF Component §13.6).
    axes:
      role:
        vocabulary: color_role
      slot:
        vocabulary: color_slot
      state:
        vocabulary: interaction_state

  palette:
    pattern: "palette.{role}.{tone}"
    dtcg_type: color
    description: >
      external — Material 3 tonal-palette token family. Source:
      seed-derived palettes from
      `@material/material-color-utilities@0.4.0`, output at
      `.material3-tokens/tokens-baseline.json`'s `palettes.*.*` objects.
      Six palettes (primary, secondary, tertiary, neutral,
      neutralVariant, error), 16 tones each.

      This grammar is declared for completeness. Neither Button nor
      FAB binds to raw palette tones in this pass — they bind to the
      colour-role grammar above, which is Material's preferred
      abstraction. Consumers extending the Profile with custom
      components MAY bind directly to palettes (for specialised
      chromatic effects that can't be expressed through roles).
    axes:
      role:
        vocabulary: palette_role
      tone:
        vocabulary: palette_tone

  elevation:
    pattern: "elevation.{level}"
    dtcg_type: shadow
    description: >
      external — Material 3 elevation token family. Source:
      manually transcribed from m3.material.io elevation-tokens docs,
      output at `.material3-tokens/tokens-static.json`'s
      elevation block. Six tiers (level0–5); level0 is a zero-offset
      zero-blur transparent shadow (no visible elevation), level5 is
      the modal/dialog tier. Each token resolves to a DTCG shadow
      value with the two-shadow composite Material specifies
      (ambient + key).

      `dtcg_type: shadow` is DTCG 2025.10's composite-shadow type.
    axes:
      level:
        vocabulary: elevation_level

  shape.corner:
    pattern: "shape.corner.{step}"
    dtcg_type: dimension
    description: >
      external — Material 3 shape-corner scale. Source: manually
      transcribed from m3.material.io shape-scale-tokens docs, output
      at `.material3-tokens/tokens-static.json`'s shape.corner block.
      Seven steps from 0px (none) to 9999px (full — pill). Buttons
      default to `full`; FAB default is `large`, extended FAB is
      `extraLarge`. Applied via `border-radius:` bindings.
    axes:
      step:
        vocabulary: shape_step

  motion.duration:
    pattern: "motion.duration.{bucket}"
    dtcg_type: duration
    description: >
      external — Material 3 motion-duration scale. Source: manually
      transcribed from m3.material.io motion-duration-tokens docs,
      output at `.material3-tokens/tokens-static.json`'s
      motion.duration block. Seven named durations from 50ms
      (`short1`) to 400ms (`long1`). Button / FAB state transitions
      use `short4` (200ms).

      `dtcg_type: duration` is DTCG 2025.10's duration type.
    axes:
      bucket:
        vocabulary: motion_duration_bucket

  motion.easing:
    pattern: "motion.easing.{name}"
    dtcg_type: cubicBezier
    description: >
      external — Material 3 motion-easing names. Source: manually
      transcribed from m3.material.io motion-easing-tokens docs,
      output at `.material3-tokens/tokens-static.json`'s motion.easing
      block. Five named curves — Material 3 maps named curves to
      concrete cubic-beziers at toolchain output time, so the Profile
      enumerates the NAMES and the DTCG leaves hold the concrete
      bezier values.

      `dtcg_type: cubicBezier` is DTCG 2025.10's cubic-bezier type.
    axes:
      name:
        vocabulary: motion_easing_name

  typography:
    pattern: "typography.{role}.{scale}"
    dtcg_type: typography
    description: >
      external — Material 3 type-scale composite. Source: manually
      transcribed from m3.material.io typography-tokens docs. 15
      tokens (5 roles × 3 scales); each resolves to a DTCG composite
      typography value with `fontFamily`, `fontSize`, `fontWeight`,
      `letterSpacing`, `lineHeight` sub-values.

      `dtcg_type: typography` is DTCG 2025.10's composite typography
      type.

      Button/FAB labels bind to `typography.label.large`. The full
      grammar is declared for completeness — exercising whether
      token_grammar composes at scale on a 15-cell × 5-sub-property
      matrix, per the brief's Typography-grammar watch item.
    axes:
      role:
        vocabulary: typography_role
      scale:
        vocabulary: typography_scale

# ── Token Layers ─────────────────────────────────────────────────────────────
# No CDF-level token layering. Material's "state layer" is NOT a token
# layer in the CDF sense — see findings.md F-material-0 for why.
# Material's palette → role mapping is not CDF-layered either; the
# Profile exposes both grammars (palette + color-role) independently,
# and the toolchain's DTCG emitter references one from the other
# internally.

token_layers: []

# ── Standalone Tokens ────────────────────────────────────────────────────────
# Two singletons — everything else lives in token_grammar above.

standalone_tokens:

  color.outline:
    dtcg_type: color
    description: >
      external — Material 3 outline colour (the `outline` role from
      `.material3-tokens/tokens-baseline.json`'s schemes.{light,dark}).
      Not modelled as a color_role grammar entry because `outline` has
      only one slot (base) and no container variants — standalone is
      the honest encoding. Used for Button variant=outlined border
      and for the focus ring (shared — see `color.focus.outline`
      below for the focus-specific variant).

  color.focus.outline:
    dtcg_type: color
    description: >
      external — Material 3 focus-visible outline colour. Primary
      3 dp outline per Material's focus-indicator spec; single-ring
      pattern per §13.5.1. Value is `color.primary.base.rest` tonally
      at focus — the toolchain treats this as a separate materialised
      token so the Component spec can bind to it without knowing the
      composition. Second-DS-reuse of the single-ring pattern
      F-shadcn-5 / F-primer-4a first logged; re-confirmed as
      F-material-4 (third-DS data point, draft.8 note already landed
      via §13.5.1).

# ── Theming ──────────────────────────────────────────────────────────────────
# F-material-1: TWO axes (semantic × contrast), not one flat-six and
# not three. Vision-accommodation (F-primer-2's deferred question)
# stays deferred — Material's contrast axis is orthogonal to
# accommodation (contrast is a W3C-WCAG gradation the DS itself
# produces; accommodation is a user-preference axis the OS/browser
# signals). Declaring them as separate axes would be the next step if
# a fifth Big-DS pass surfaces accommodation-specific evidence.
#
# `set_mapping: {}` because there is no `token_sources.sets` block —
# the toolchain-owned .material3-tokens/ is not a DTCG-sets directory,
# and a downstream DTCG emitter would materialise per-mode values
# inline (same pattern as Primer's $extensions.overrides, F-primer-0).

theming:
  modifiers:
    semantic:
      description: >
        Canonical Light / Dark. Toggles tonal inversion across every
        role (primary at tone 40 light / tone 80 dark, etc.). Values
        per mode live in `.material3-tokens/tokens-baseline.json`
        schemes.light and .dark.
      contexts: [Light, Dark]
      default: Light
      required: true
      data_attribute: data-semantic
    contrast:
      description: >
        Accessibility contrast level. Material 3's dynamic-colour
        toolchain can generate three seed-derived contrast variants
        per semantic: `standard` (default), `medium` (increased
        ratios for moderate accommodation), `high` (full 7:1
        contrast guarantee). Orthogonal to `semantic` — every
        (semantic × contrast) cell is a legal combination (2 × 3 = 6
        cells). The 2-axis modelling is the F-material-1 decision
        (alternative: flat-six values on one axis; rejected as
        less legible).

        Vision-accommodation (protanopia, tritanopia, etc.) is a
        SEPARATE concern and stays deferred per F-primer-2 —
        Material's contrast axis does not claim to cover
        accommodation. A future pass can add `accommodation:` as a
        third axis without touching `semantic` or `contrast`.
      contexts: [standard, medium, high]
      default: standard
      required: false
      data_attribute: data-contrast
  set_mapping: {}

# ── Naming ───────────────────────────────────────────────────────────────────
# `m3` is short, lowercase, disjoint from `ft` (Formtrieb), `mp` (Formtrieb),
# `rdx` (Radix), `sh` (shadcn), `pr` (Primer). camelCase throughout
# matches Material's own `onPrimaryContainer` / `surfaceVariant` style.

naming:
  identifier: m3
  casing:
    component_names: PascalCase
    properties: camelCase
    token_paths: camelCase
  reserved_names: {}

# ── Interaction Patterns ─────────────────────────────────────────────────────
# Material 3 treats `focus` as a FIRST-CLASS STATE (not just a browser
# pseudoclass) — it has its own state-layer token at 10% opacity.
# Declaring it in the pressable pattern's `states:` list makes the
# state-token grammar resolvable (`color.primary.base.focus`). shadcn
# and Primer both collapsed focus into focus-visible-only (no
# state-layer); Material is the first DS in the series where focus
# is a full token-surface citizen.

interaction_patterns:

  pressable:
    description: >
      Pointer + keyboard activation — Button, FAB. Material 3 treats
      focus as a distinct interaction state (separate from hover and
      from focus-visible's outline) with its own state-layer token.
      Expanded five-state axis; token_mapping is 1:1 to
      interaction_state values.
    states: [enabled, hover, focus, pressed, disabled]
    token_mapping:
      enabled: rest
      hover: hover
      focus: focus
      pressed: pressed
      disabled: disabled
    promoted: [disabled]

# ── Accessibility Defaults ───────────────────────────────────────────────────

accessibility_defaults:

  focus_ring:
    description: >
      Single-ring focus indicator — `color.focus.outline` applied as
      a 3dp outline per Material's focus-indicator spec. Material
      ALSO applies a state-layer overlay at 10% opacity on focus
      (baked into the `color.{role}.{slot}.focus` token by the
      toolchain). The ring is separate from the overlay; the Component
      spec's `outline-color:` binding covers the ring, the
      state-token-resolved background covers the overlay. §13.5.1's
      single-ring prose covers the ring part; the state-layer is
      token-driven per §1.1 #2.
    pattern: single-ring
    token_group: color.focus

  category_defaults:
    Interactive:
      focus_visible: true
      element: button
      keyboard: pressable

# ── Categories ───────────────────────────────────────────────────────────────
# Only Interactive. Button + FAB are both pressable controls with
# colour-role × state bindings. No Primitive / Status / Layout /
# Overlays needed for this two-component scope.

categories:

  Interactive:
    description: >
      User-input components. Both Button and FAB sit here — variant ×
      state × (optional size) cross-product with full pressable state
      coverage including focus as a token-backed state.
    interaction: pressable
    token_grammar: color
    examples: [Button, FAB]
